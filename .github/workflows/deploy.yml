name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps: # 하나의 과정들 
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:${{ github.sha }}

  deploy: # 코드가 변경되었을떄 자동으로 git clone 을 해줌
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.NCP_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deploy files
        run: |
          scp -i ~/.ssh/id_rsa -r docker-compose.yml nginx \
            ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}:/tmp/my_repo/

      - name: Deploy on NCP
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} "
            cd /tmp/my_repo &&
            systemctl stop nginx || true &&
            systemctl disable nginx || true &&
            docker compose pull &&
            docker compose up -d --remove-orphans
          "
